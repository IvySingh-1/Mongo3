<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b3832" />
      <stop offset="50%" stop-color="#854442" />
      <stop offset="100%" stop-color="#3c2f2f" />
    </linearGradient>
    <style>
      @keyframes float-fast {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(5deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      @keyframes float-slow {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(10px) rotate(-5deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      .title {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 800;
        fill: #fff4e6;
        font-size: 58px;
        letter-spacing: 4px;
      }
      .subtitle {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 600;
        fill: #be9b7b;
        font-size: 15px;
        letter-spacing: 1px;
      }
      .floating-1 {
        animation: float-fast 6s ease-in-out infinite;
        transform-origin: center;
      }
      .floating-2 {
        animation: float-slow 8s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bannerGrad)" rx="20"/>
  
  <!-- Animated Tiled Elements -->
  <g class="floating-1" fill="#be9b7b" opacity="0.12">
    <path d="M70 50h12a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3h-6l-4 4v-4h-2a3 3 0 0 1-3-3v-6a3 3 0 0 1 3-3z"/>
    <circle cx="720" cy="60" r="15"/>
  </g>
  <g class="floating-2" fill="#be9b7b" opacity="0.08">
    <path d="M710 160h12a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3h-6l-4 4v-4h-2a3 3 0 0 1-3-3v-6a3 3 0 0 1 3-3z"/>
    <circle cx="100" cy="150" r="22"/>
  </g>

  <!-- Logo and Tagline -->
  <text x="50%" y="110" text-anchor="middle" class="title">CONNECTLY</text>
  <text x="50%" y="155" text-anchor="middle" class="subtitle">A practical reference for RESTful APIs, full-stack CRUD operations and MongoDB persistence.</text>
</svg>
